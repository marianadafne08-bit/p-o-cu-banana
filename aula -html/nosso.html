<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Treino de Clique - Estourar Balões</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; cursor: crosshair; }
        #placar { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .balao {
            position: absolute;
            width: 60px;
            height: 80px;
            background-color: red;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .balao:active { transform: scale(0.5); }
    </style>
</head>
<body>

    <div id="placar">Balões Estourados: 0</div>

    <script>
        let pontos = 0;
        const placar = document.getElementById('placar');

        function criarBalao() {
            const balao = document.createElement('div');
            balao.className = 'balao';
            
            // Posição aleatória
            const x = Math.random() * (window.innerWidth - 60);
            const y = Math.random() * (window.innerHeight - 80);
            
            balao.style.left = x + 'px';
            balao.style.top = y + 'px';
            
            // Cor aleatória
            const cores = ['#ff4d4d', '#4d79ff', '#ffdb4d', '#4dff4d', '#ff4dff'];
            balao.style.backgroundColor = cores[Math.floor(Math.random() * cores.length)];

            // Evento de clique
            balao.onclick = function() {
                pontos++;
                placar.innerText = `Balões Estourados: ${pontos}`;
                this.remove(); // Remove o balão ao clicar
                criarBalao();  // Cria um novo imediatamente
            };

            document.body.appendChild(balao);
        }

        // Começa com 3 balões na tela
        criarBalao();
        criarBalao();
        criarBalao();
    </script>
</body>
</html>
